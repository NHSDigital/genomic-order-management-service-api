name: "Infrastructure Deploy"

# Deployment workflow for infrastructure changes
# Manual dispatch after merge - deploys to selected environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for deployment'
        required: true
        type: choice
        default: 'int'
        options:
          - int
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  metadata:
    name: "Set CI/CD metadata"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      build_datetime: ${{ steps.variables.outputs.build_datetime }}
      build_timestamp: ${{ steps.variables.outputs.build_timestamp }}
      build_epoch: ${{ steps.variables.outputs.build_epoch }}
      terraform_version: ${{ steps.variables.outputs.terraform_version }}
      version: ${{ steps.variables.outputs.version }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          ref: main

      - name: "Set CI/CD variables"
        id: variables
        run: |
          datetime=$(date -u +'%Y-%m-%dT%H:%M:%S%z')
          echo "build_datetime=$datetime" >> $GITHUB_OUTPUT
          echo "build_timestamp=$(date --date=$datetime -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          echo "build_epoch=$(date --date=$datetime -u +'%s')" >> $GITHUB_OUTPUT
          echo "terraform_version=$(grep "^terraform" .tool-versions | cut -f2 -d' ')" >> $GITHUB_OUTPUT
          echo "version=$(head -n 1 .version 2> /dev/null || echo unknown)" >> $GITHUB_OUTPUT

      - name: "List variables"
        run: |
          export BUILD_DATETIME="${{ steps.variables.outputs.build_datetime }}"
          export BUILD_TIMESTAMP="${{ steps.variables.outputs.build_timestamp }}"
          export BUILD_EPOCH="${{ steps.variables.outputs.build_epoch }}"
          export TERRAFORM_VERSION="${{ steps.variables.outputs.terraform_version }}"
          export VERSION="${{ steps.variables.outputs.version }}"
          make list-variables

  commit-checks:
    name: "Pre-deployment checks"
    needs: [metadata]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: "Scan secrets"
        uses: ./.github/actions/scan-secrets

      - name: "Check file format"
        uses: ./.github/actions/check-file-format

      - name: "Lint Terraform"
        uses: ./.github/actions/lint-terraform

  terraform-validate:
    name: "Terraform validate"
    needs: [metadata, commit-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          ref: main

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.metadata.outputs.terraform_version }}

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: "Terraform Init"
        run: |
          make terraform-init \
            dir=infrastructure/environments/${{ github.event.inputs.environment }}

      - name: "Terraform Validate"
        run: |
          make terraform-validate \
            dir=infrastructure/environments/${{ github.event.inputs.environment }}

  terraform-plan:
    name: "Terraform plan for ${{ github.event.inputs.environment }}"
    needs: [metadata, terraform-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          ref: main

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.metadata.outputs.terraform_version }}

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: "Terraform Init"
        run: |
          make terraform-init \
            dir=infrastructure/environments/${{ github.event.inputs.environment }}

      - name: "Terraform Plan"
        id: plan
        run: |
          make terraform-plan \
            dir=infrastructure/environments/${{ github.event.inputs.environment }} \
            opts="-var-file=../terraform.tfvars -var-file=terraform.tfvars -var 'irs_role_arn=${{ secrets.IRS_ROLE_ARN }}' -no-color -out=tfplan"
          echo "plan_output=$(terraform show -no-color infrastructure/environments/${{ github.event.inputs.environment }}/tfplan | head -100)" >> $GITHUB_OUTPUT

      - name: "Save tfplan"
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: infrastructure/environments/${{ github.event.inputs.environment }}/tfplan
          retention-days: 7

  terraform-apply:
    name: "Terraform apply to ${{ github.event.inputs.environment }}"
    needs: [metadata, terraform-plan]
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}-infrastructure
    timeout-minutes: 30
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          ref: main

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.metadata.outputs.terraform_version }}

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: "Terraform Init"
        run: |
          make terraform-init \
            dir=infrastructure/environments/${{ github.event.inputs.environment }}

      - name: "Download tfplan artifact"
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: infrastructure/environments/${{ github.event.inputs.environment }}/

      - name: "Terraform Apply"
        run: |
          make terraform-apply \
            dir=infrastructure/environments/${{ github.event.inputs.environment }} \
            opts="-no-color tfplan"

      - name: "Output infrastructure details"
        working-directory: infrastructure/environments/${{ github.event.inputs.environment }}
        run: |
          echo "## Infrastructure Deployment Summary for ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: `\(.value.value)`"' >> $GITHUB_STEP_SUMMARY


