name: "Infrastructure Validate"

# Validation workflow for infrastructure changes
# Runs on pull requests to validate Terraform code without deploying

on:
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/environments/**'
      - 'infrastructure/modules/**'
      - '.github/workflows/infra-*.yaml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  metadata:
    name: "Set CI/CD metadata"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      build_datetime: ${{ steps.variables.outputs.build_datetime }}
      build_timestamp: ${{ steps.variables.outputs.build_timestamp }}
      build_epoch: ${{ steps.variables.outputs.build_epoch }}
      terraform_version: ${{ steps.variables.outputs.terraform_version }}
      version: ${{ steps.variables.outputs.version }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set CI/CD variables"
        id: variables
        run: |
          datetime=$(date -u +'%Y-%m-%dT%H:%M:%S%z')
          echo "build_datetime=$datetime" >> $GITHUB_OUTPUT
          echo "build_timestamp=$(date --date=$datetime -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          echo "build_epoch=$(date --date=$datetime -u +'%s')" >> $GITHUB_OUTPUT
          echo "terraform_version=$(grep "^terraform" .tool-versions | cut -f2 -d' ')" >> $GITHUB_OUTPUT
          echo "version=$(head -n 1 .version 2> /dev/null || echo unknown)" >> $GITHUB_OUTPUT

      - name: "List variables"
        run: |
          export BUILD_DATETIME="${{ steps.variables.outputs.build_datetime }}"
          export BUILD_TIMESTAMP="${{ steps.variables.outputs.build_timestamp }}"
          export BUILD_EPOCH="${{ steps.variables.outputs.build_epoch }}"
          export TERRAFORM_VERSION="${{ steps.variables.outputs.terraform_version }}"
          export VERSION="${{ steps.variables.outputs.version }}"
          make list-variables

  commit-checks:
    name: "Commit stage checks"
    needs: [metadata]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Scan secrets"
        uses: ./.github/actions/scan-secrets

      - name: "Check file format"
        uses: ./.github/actions/check-file-format

      - name: "Check Markdown format"
        uses: ./.github/actions/check-markdown-format

      - name: "Lint Terraform"
        uses: ./.github/actions/lint-terraform

  terraform-plan:
    name: "Terraform plan for ${{ matrix.environment }}"
    needs: [metadata, commit-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        environment: [int, prod]
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.metadata.outputs.terraform_version }}

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: "Terraform Init - ${{ matrix.environment }}"
        run: |
          make terraform-init \
            dir=infrastructure/environments/${{ matrix.environment }}

      - name: "Terraform Plan - ${{ matrix.environment }}"
        id: plan
        run: |
          make terraform-plan \
            dir=infrastructure/environments/${{ matrix.environment }} \
            opts="-var-file=../terraform.tfvars -var-file=terraform.tfvars -var 'irs_role_arn=${{ secrets.IRS_ROLE_ARN }}' -no-color -out=tfplan"
          terraform show -no-color infrastructure/environments/${{ matrix.environment }}/tfplan > infrastructure/environments/${{ matrix.environment }}/tfplan.txt

      - name: "Comment Plan on PR"
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infrastructure/environments/${{ matrix.environment }}/tfplan.txt', 'utf8');
            
            const output = `#### Terraform Plan for \`${{ matrix.environment }}\` 📋
            
            \`\`\`
            ${plan.substring(0, 65536)}
            \`\`\`
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: "Upload tfplan artifact"
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: infrastructure/environments/${{ matrix.environment }}/tfplan

  validation-summary:
    name: "Validation summary"
    needs: [terraform-plan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: "Check validation status"
        run: |
          if [ "${{ needs.terraform-plan.result }}" == "failure" ]; then
            echo "❌ Infrastructure validation failed"
            exit 1
          else
            echo "✅ Infrastructure validation passed"
          fi
